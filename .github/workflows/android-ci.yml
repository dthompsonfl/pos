name: Android CI

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Android Build, Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
          log-accepted-android-sdk-licenses: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate local.properties
        run: |
          cat > local.properties <<'EOF'
          sdk.dir=${ANDROID_HOME}
          stripeLocationId=${{ secrets.STRIPE_LOCATION_ID }}
          squareApplicationId=${{ secrets.SQUARE_APPLICATION_ID }}
          shopifyShopDomain=${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          backendBaseUrl=${{ secrets.BACKEND_BASE_URL }}
          EOF

      - name: Verify Gradle wrapper
        run: |
          chmod +x ./gradlew
          test -f gradle/wrapper/gradle-wrapper.jar || { echo "gradle-wrapper.jar missing"; exit 1; }
          ./gradlew --version

      - name: Clean Android build
        run: ./gradlew clean --stacktrace

      - name: Run Android unit tests
        run: ./gradlew testDebugUnitTest --continue --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run Android Lint
        run: ./gradlew lintDebug --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            **/build/test-results/**/*.xml
            **/build/reports/tests/**

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: |
            **/build/reports/lint-results-*.html

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Verify Gradle wrapper
        run: |
          chmod +x ./gradlew
          ./gradlew --version

      - name: Run backend tests
        run: ./gradlew :backend:test --stacktrace

      - name: Build backend distribution
        run: ./gradlew :backend:installDist --stacktrace

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/test-results/**/*.xml

  release-build:
    name: Signed Release APK
    needs: [android-build, backend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
          log-accepted-android-sdk-licenses: false

      - uses: gradle/actions/setup-gradle@v3

      - name: Verify signing secrets are present
        run: |
          test -n "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" || { echo "Missing SIGNING_KEYSTORE_BASE64"; exit 1; }
          test -n "${{ secrets.SIGNING_KEYSTORE_PASSWORD }}" || { echo "Missing SIGNING_KEYSTORE_PASSWORD"; exit 1; }
          test -n "${{ secrets.SIGNING_KEY_ALIAS }}" || { echo "Missing SIGNING_KEY_ALIAS"; exit 1; }
          test -n "${{ secrets.SIGNING_KEY_PASSWORD }}" || { echo "Missing SIGNING_KEY_PASSWORD"; exit 1; }

      - name: Decode signing key
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          POS_RELEASE_KEYSTORE_PATH: release.keystore
          POS_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          POS_RELEASE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          POS_RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Verify APK exists
        run: test -f app/build/outputs/apk/release/app-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk
