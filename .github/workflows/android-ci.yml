name: Android CI

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate local.properties
        run: |
          cat > local.properties <<'EOF'
          sdk.dir=${ANDROID_HOME}
          stripeLocationId=${{ secrets.STRIPE_LOCATION_ID }}
          squareApplicationId=${{ secrets.SQUARE_APPLICATION_ID }}
          shopifyShopDomain=${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          backendBaseUrl=${{ secrets.BACKEND_BASE_URL }}
          EOF

      - name: Verify Gradle wrapper
        run: |
          test -f gradle/wrapper/gradle-wrapper.jar || { echo "gradle-wrapper.jar missing"; exit 1; }
          ./gradlew --version

      - name: Build debug APK & run unit tests
        run: ./gradlew clean assembleDebug testDebugUnitTest --continue --stacktrace

      - name: Run Android Lint
        run: ./gradlew lintDebug --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            **/build/test-results/**/*.xml
            **/build/reports/tests/**

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: |
            **/build/reports/lint-results-*.html

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release-build:
    name: Signed Release APK
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
      - uses: gradle/actions/setup-gradle@v3

      - name: Decode signing key
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          POS_RELEASE_KEYSTORE_PATH: release.keystore
          POS_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          POS_RELEASE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          POS_RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Verify APK is signed
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "Release APK built"
          else
            echo "Release APK missing — signing likely not configured"
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk
